# This file was automatically generated by `qlty init` and customized for this repository.
config_version = "0"

exclude_patterns = [
  "**/.github/skills/**",
  "**/.git/**",
  "**/.next/**",
  "**/.venv/**",
  "**/build/**",
  "**/coverage/**",
  "**/dist/**",
  "**/node_modules/**",
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
]

[smells]
mode = "comment"

[[source]]
name = "default"
default = true

[[plugin]]
name = "actionlint"

[[plugin]]
name = "prettier"

[[plugin]]
name = "shellcheck"

[[plugin]]
name = "shfmt"
