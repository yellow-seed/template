packages:
  - type: github_release
    repo_owner: azu
    repo_name: dockerfile-pin
    asset: dockerfile-pin_{{.OS}}_{{.Arch}}.{{.Format}}
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    checksum:
      type: github_release
      asset: checksums.txt
      file_format: regexp
      algorithm: sha256
      pattern:
        checksum: ^(\b[A-Fa-f0-9]{64}\b)
        file: "^\\b[A-Fa-f0-9]{64}\\b\\s+(\\S+)$"
