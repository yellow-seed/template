name: Terraform Drift Detection

on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift:
    name: detect drift
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .github/terraform/repository-settings

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3

      - name: Set repository name
        run: echo "TF_VAR_repository_name=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_ENV"

      - name: terraform init
        run: terraform init

      - name: terraform import
        env:
          TF_VAR_github_owner: ${{ github.repository_owner }}
          TF_VAR_github_token: ${{ secrets.GH_TOKEN }}
        run: terraform import github_repository.template "${TF_VAR_repository_name}"

      - name: terraform plan (drift check)
        env:
          TF_VAR_github_owner: ${{ github.repository_owner }}
          TF_VAR_github_token: ${{ secrets.GH_TOKEN }}
        run: |
          terraform plan -detailed-exitcode -no-color
