name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/terraform/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .github/terraform/repository-settings

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform init
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

      - uses: terraform-linters/setup-tflint@v4

      - name: tflint init
        run: tflint --init

      - name: tflint
        run: tflint --format compact

  plan:
    name: terraform plan
    needs: [validate]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .github/terraform/repository-settings

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3

      - name: Set repository name
        run: echo "TF_VAR_repository_name=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_ENV"

      - name: terraform init
        run: terraform init

      - name: terraform import
        env:
          TF_VAR_github_owner: ${{ github.repository_owner }}
          TF_VAR_github_token: ${{ secrets.GITHUB_TOKEN }}
        run: terraform import github_repository.template "${TF_VAR_repository_name}"

      - name: terraform plan
        id: plan
        env:
          TF_VAR_github_owner: ${{ github.repository_owner }}
          TF_VAR_github_token: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          terraform plan -no-color 2>&1 | tee "$GITHUB_WORKSPACE/plan_output.txt"
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          set -e

      - name: Post plan to PR
        uses: actions/github-script@v7
        if: always()
        env:
          PLAN_EXIT_CODE: ${{ steps.plan.outputs.exit_code }}
        with:
          script: |
            const fs = require('fs');
            let output = fs.readFileSync(process.env.GITHUB_WORKSPACE + '/plan_output.txt', 'utf8');
            const MAX = 60000;
            if (output.length > MAX) output = output.slice(0, MAX) + '\n... (truncated)';

            const status = process.env.PLAN_EXIT_CODE === '0' ? '✅' : '❌';
            const body = [
              `### Terraform Plan ${status}`,
              '',
              '<details><summary>Plan output</summary>',
              '',
              '```',
              output,
              '```',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('### Terraform Plan'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan errored
        if: steps.plan.outputs.exit_code != '0'
        run: exit 1
