name: Verify Codex Setup

on:
  workflow_dispatch:

jobs:
  verify-codex-setup:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run codex-setup.sh
        run: bash .codex/hooks/codex-setup.sh

      - name: Verify installed tools
        run: |
          qlty --version
