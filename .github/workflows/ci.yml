name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches:
      [
        main,
        feat/*,
        fix/*,
        docs/*,
        style/*,
        refactor/*,
        perf/*,
        test/*,
        chore/*,
        copilot/*,
        claude/*,
      ]

jobs:
  Lint:
    name: qlty Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install qlty
        uses: qltysh/qlty-action/install@v1

      - name: Run checks
        run: scripts/run-checks.sh

  Test:
    name: bats Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install bats
        run: |
          bash scripts/installers/mise.sh
          export PATH="$HOME/.local/bin:$PATH"
          mise install bats
          echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"

      - name: Run bats tests
        run: bats tests/*.bats
