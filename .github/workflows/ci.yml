name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches:
      [
        main,
        feat/*,
        fix/*,
        docs/*,
        style/*,
        refactor/*,
        perf/*,
        test/*,
        chore/*,
        copilot/*,
        claude/*,
      ]

jobs:
  qlty:
    name: qlty checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install qlty
        uses: qltysh/qlty-action/install@v1

      - name: Run qlty (all files)
        run: qlty check --all

      - name: Run qlty (changed files)
        run: qlty check

  Test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Run tests
        run: echo "Add your test commands here"
